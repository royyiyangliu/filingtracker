<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>港美股资金追踪</title>

  <!-- Tabulator v6 -->
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" />
  <!-- D3.js (for HK Connect tabs) -->
  <script src="assets/d3.min.js"></script>
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

  <style>
    /* ── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 32px 0;
    }
    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
      padding-bottom: 16px;
    }
    .header-title { font-size: 20px; font-weight: 600; letter-spacing: 0.3px; }
    .header-sub { font-size: 13px; color: #9ba3bc; margin-top: 3px; }
    .header-meta { font-size: 12px; color: #9ba3bc; text-align: right; }
    .header-meta span { color: #e2e8f0; }

    /* ── Tabs ──────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      border-top: 1px solid #2d3150;
    }
    .tab-btn {
      padding: 10px 22px;
      font-size: 13px;
      font-weight: 500;
      color: #9ba3bc;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 3px solid transparent;
      transition: all .15s;
      letter-spacing: 0.2px;
    }
    .tab-btn:hover { color: #e2e8f0; }
    .tab-btn.active { color: #fff; border-bottom-color: #3b82f6; }

    /* ── Tab Panels ────────────────────────────────────── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Filter Bar ────────────────────────────────────── */
    .filters {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
    }
    .filter-group select,
    .filter-group input[type="text"],
    .filter-group input[type="date"] {
      height: 34px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .filter-group select { padding-right: 28px; cursor: pointer; }
    .filter-group select:focus,
    .filter-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    .filter-group input[type="text"] { width: 220px; }
    .filter-group input[type="date"] { width: 140px; }
    .btn-reset {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #64748b;
      transition: all .15s;
      align-self: flex-end;
    }
    .btn-reset:hover { background: #f1f5f9; border-color: #94a3b8; color: #1a1a2e; }
    .btn-download {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      background: #eff6ff;
      font-size: 13px;
      cursor: pointer;
      color: #1d4ed8;
      transition: all .15s;
      align-self: flex-end;
    }
    .btn-download:hover { background: #3b82f6; color: #fff; }

    /* ── Stats Bar ─────────────────────────────────────── */
    .stats-bar {
      padding: 10px 32px;
      font-size: 13px;
      color: #64748b;
      display: flex;
      gap: 20px;
      background: #f5f6fa;
    }
    .stats-bar strong { color: #1a1a2e; }

    /* ── Table Container ───────────────────────────────── */
    .table-wrap { padding: 0 24px 32px; overflow-x: auto; }

    /* ── Tabulator Overrides (shared) ──────────────────── */
    .tabulator-header { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
    .tabulator-header .tabulator-col { border-right: 1px solid #e9ecef; }
    .tabulator-header .tabulator-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #475569; white-space: normal; line-height: 1.4; }
    .tabulator-row { border-bottom: 1px solid #f1f5f9; }
    .tabulator-row:hover { background: #f8faff !important; }
    .tabulator-row.tabulator-row-even { background: #fafbfd; }
    .tabulator-cell { font-size: 13px; padding: 9px 12px; color: #334155; vertical-align: middle; }

    /* ── Column Groups: SEC ────────────────────────────── */
    #filings-table .tabulator-col-group.col-group-form4 { background: #ecfdf5 !important; border-left: 2px solid #6ee7b7 !important; }
    #filings-table .tabulator-col-group.col-group-form4 .tabulator-col-title { color: #166534; }
    #filings-table .tabulator-col.col-form4 { border-left: 1px solid #d1fae5 !important; background: #f5fef7 !important; }
    #filings-table .tabulator-cell.col-form4 { background: rgba(236,253,245,0.35); }

    #filings-table .tabulator-col-group.col-group-13dg { background: #eff6ff !important; border-left: 2px solid #93c5fd !important; }
    #filings-table .tabulator-col-group.col-group-13dg .tabulator-col-title { color: #1d4ed8; }
    #filings-table .tabulator-col.col-13dg { border-left: 1px solid #dbeafe !important; background: #f5f9ff !important; }
    #filings-table .tabulator-cell.col-13dg { background: rgba(239,246,255,0.35); }

    /* ── Badges ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-13g    { background: #dbeafe; color: #1d4ed8; }
    .badge-13g-a  { background: #eff6ff; color: #2563eb; }
    .badge-13d    { background: #fce7f3; color: #9d174d; }
    .badge-13d-a  { background: #fdf2f8; color: #be185d; }
    .badge-other  { background: #f1f5f9; color: #64748b; }
    .badge-4      { background: #f0fdf4; color: #166534; }
    .badge-hk     { background: #dcfce7; color: #15803d; }
    .badge-us     { background: #dbeafe; color: #1d4ed8; }

    /* ── Ticker / Stock Code Pill ──────────────────────── */
    .ticker-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      background: #1a1a2e;
      color: #e2e8f0;
      margin-right: 6px;
      letter-spacing: 0.3px;
    }

    /* ── Delta / Number colors ─────────────────────────── */
    .delta-up   { color: #16a34a; font-weight: 500; }
    .delta-down { color: #dc2626; font-weight: 500; }
    .delta-flat { color: #94a3b8; }
    .num  { font-variant-numeric: tabular-nums; }
    .muted { color: #94a3b8; }

    /* ── EDGAR Link ────────────────────────────────────── */
    .edgar-link {
      display: inline-flex; align-items: center; gap: 4px;
      color: #3b82f6; text-decoration: none; font-size: 12px; font-weight: 500;
      padding: 3px 8px; border: 1px solid #bfdbfe; border-radius: 4px; transition: all .15s;
    }
    .edgar-link:hover { background: #eff6ff; border-color: #93c5fd; }

    /* ── Loading / Error ───────────────────────────────── */
    .loading-msg, .error-msg {
      text-align: center; padding: 80px 32px; color: #64748b; font-size: 15px;
    }
    .error-msg { color: #dc2626; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-top, .filters, .stats-bar, .table-wrap { padding-left: 16px; padding-right: 16px; }
      .filter-group input[type="text"] { width: 180px; }
    }

    /* ════════════════════════════════════════════════════
       HK CONNECT TABS (Tab 3 & 4) — scoped to .hk-panel
       ════════════════════════════════════════════════════ */
    .hk-panel { max-width: 1300px; margin: 16px auto; padding: 0 16px; }

    /* 卡片 */
    .hk-panel .card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 16px; padding: 16px 20px;
    }
    .hk-panel .card-no-pad { padding: 0; }
    .hk-panel .card-title { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 12px; }

    /* 控制栏 */
    .hk-panel .controls { display:flex; gap:16px; flex-wrap:wrap; align-items:center; }
    .hk-panel .ctrl-group { display:flex; align-items:center; gap:8px; }
    .hk-panel .ctrl-label { color:#666; white-space:nowrap; font-size:13px; }
    .hk-panel .btn-group { display:flex; gap:4px; }
    .hk-panel .hk-btn {
      border:1px solid #d0d0d0; background:#fff;
      padding:4px 14px; border-radius:4px;
      cursor:pointer; font-size:13px; color:#555; transition:all .15s;
    }
    .hk-panel .hk-btn:hover { border-color:#1a73e8; color:#1a73e8; }
    .hk-panel .hk-btn.active { background:#1a73e8; border-color:#1a73e8; color:#fff; }

    /* 图表容器 */
    .hk-panel .chart-box { width:100%; height:300px; position:relative; }
    .hk-panel .chart-hint { text-align:center; color:#999; font-size:13px; padding:120px 0; }
    .d3-tip {
      display:none; position:absolute; background:rgba(0,0,0,.75);
      color:#fff; padding:6px 10px; border-radius:4px;
      font-size:12px; line-height:1.6; pointer-events:none;
      white-space:nowrap; z-index:10;
    }

    /* 数字颜色 */
    .hk-panel .up   { color:#d93025; }
    .hk-panel .down { color:#1e8e3e; }
    .hk-panel .flat { color:#888; }

    /* 排行表格 */
    .hk-panel .table-wrap { overflow-x:auto; padding:0; }
    .hk-panel table { width:100%; border-collapse:collapse; font-size:13px; }
    .hk-panel thead th {
      background:#f8f9fa; padding:10px 14px; text-align:left;
      font-weight:500; color:#555; border-bottom:2px solid #e8e8e8;
      white-space:nowrap; position:sticky; top:0; z-index:1;
    }
    .hk-panel tbody tr { cursor:pointer; transition:background .1s; }
    .hk-panel tbody tr:hover { background:#f0f7ff; }
    .hk-panel tbody tr.selected { background:#e8f0fe; }
    .hk-panel tbody td { padding:8px 14px; border-bottom:1px solid #f0f0f0; white-space:nowrap; }
    .hk-panel td.code { font-family:"SF Mono",Consolas,monospace; color:#1a73e8; font-size:12px; }
    .hk-panel th.sortable { cursor:pointer; user-select:none; }
    .hk-panel th.sortable:hover { background:#eef2f7 !important; }
    .hk-panel th.sort-asc::after  { content:" ↑"; color:#1a73e8; }
    .hk-panel th.sort-desc::after { content:" ↓"; color:#1a73e8; }
    .hk-panel tbody tr.selected td:first-child { border-left:3px solid var(--row-color,#1a73e8); }

    /* 顶部双栏：折线图 + 行业表 */
    .hk-top-inner { display:flex; gap:16px; align-items:flex-start; }
    .hk-chart-col { flex:1 1 0; min-width:0; }
    .hk-ind-col { flex:0 0 220px; width:220px; }
    .hk-ind-title { font-size:12px; color:#888; margin-bottom:6px; font-weight:500; }
    .hk-ind-wrap { max-height:348px; overflow-y:auto; border:1px solid #f0f0f0; border-radius:4px; }
    .hk-ind-table { width:100%; border-collapse:collapse; font-size:12px; }
    .hk-ind-table td { padding:4px 8px; border-bottom:1px solid #f8f8f8; white-space:nowrap; }
    .hk-ind-table tr:last-child td { border-bottom:none; }
    .hk-ind-table tr:hover td { background:#f5f5f5; cursor:pointer; }
    .hk-ind-table tr.ind-active td { background:#e8f0fe; }
    .hk-ind-val { text-align:right; font-variant-numeric:tabular-nums; }

    /* 多股选择 chip */
    .sel-chips { display:flex; flex-wrap:wrap; gap:6px; min-height:20px; }
    .sel-chip {
      display:inline-flex; align-items:center; gap:4px;
      padding:2px 8px 2px 6px; border-radius:12px;
      font-size:12px; color:#fff; cursor:pointer; user-select:none;
    }
    .sel-chip .rm { opacity:.7; font-size:14px; line-height:1; }
    .sel-chip:hover .rm { opacity:1; }

    /* 行业下拉多选 */
    .hk-ind-dropdown { position:relative; }
    .hk-ind-dd-btn {
      display:inline-flex; align-items:center; gap:6px;
      padding:4px 10px; border-radius:4px; border:1px solid #ddd;
      background:#fff; font-size:13px; cursor:pointer; white-space:nowrap; user-select:none;
    }
    .hk-ind-dd-btn.has-filter { border-color:#1a73e8; color:#1a73e8; }
    .hk-ind-dd-panel {
      position:absolute; top:calc(100% + 4px); left:0;
      background:#fff; border:1px solid #ddd; border-radius:6px;
      box-shadow:0 4px 16px rgba(0,0,0,.12); z-index:200;
      min-width:170px; max-height:300px;
      display:flex; flex-direction:column;
    }
    .hk-ind-dd-actions {
      display:flex; justify-content:space-between;
      padding:6px 12px; border-bottom:1px solid #eee; font-size:12px; flex-shrink:0;
    }
    .hk-ind-dd-actions span { color:#1a73e8; cursor:pointer; }
    .hk-ind-dd-actions span:hover { text-decoration:underline; }
    .hk-ind-dd-list { overflow-y:auto; flex:1; padding:4px 0; }
    .hk-ind-dd-item {
      display:flex; align-items:center; gap:8px;
      padding:5px 12px; cursor:pointer; font-size:13px;
    }
    .hk-ind-dd-item:hover { background:#f5f5f5; }
    .hk-ind-dd-item input[type=checkbox] { accent-color:#1a73e8; cursor:pointer; }

    /* 搜索框 */
    .hk-search { padding:4px 10px; border:1px solid #ddd; border-radius:4px; font-size:13px; width:140px; outline:none; }
    .hk-search:focus { border-color:#1a73e8; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">港美股资金追踪</div>
      <div class="header-sub">SEC机构持仓 · 港股回购 · 港股通南向资金</div>
    </div>
    <div class="header-meta" id="meta-sec"></div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sec',   this)">SEC 持仓披露</button>
    <button class="tab-btn"        onclick="switchTab('hk',    this)">港股回购</button>
    <button class="tab-btn"        onclick="switchTab('flow',  this)">南向资金流向</button>
    <button class="tab-btn"        onclick="switchTab('stocks',this)">个股持仓</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- TAB: SEC                                                                  -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-sec" class="tab-panel active">

  <div class="filters">
    <div class="filter-group">
      <label>公司</label>
      <select id="f-ticker">
        <option value="">全部公司</option>
      </select>
    </div>
    <div class="filter-group">
      <label>表格类型</label>
      <select id="f-form">
        <option value="">全部类型</option>
        <option value="SC 13D">SC 13D（新增举牌）</option>
        <option value="SC 13D/A">SC 13D/A（修正）</option>
        <option value="SC 13G">SC 13G（新增被动）</option>
        <option value="SC 13G/A">SC 13G/A（修正）</option>
        <option value="4">Form 4（内部人交易）</option>
        <option value="4/A">Form 4/A（修正）</option>
      </select>
    </div>
    <div class="filter-group">
      <label>申报日期 起</label>
      <input type="date" id="f-date-from" />
    </div>
    <div class="filter-group">
      <label>申报日期 止</label>
      <input type="date" id="f-date-to" />
    </div>
    <div class="filter-group">
      <label>申报人搜索</label>
      <input type="text" id="f-filer" placeholder="股东 / 机构名称…" />
    </div>
    <button class="btn-reset" onclick="resetSecFilters()">清除筛选</button>
    <button class="btn-download" onclick="downloadSEC()">↓ 导出 CSV</button>
  </div>

  <div class="stats-bar">
    <span>显示 <strong id="count-visible">—</strong> 条，共 <strong id="count-total">—</strong> 条</span>
  </div>

  <div class="table-wrap">
    <div class="loading-msg" id="loading-sec">正在加载数据…</div>
    <div class="error-msg"   id="error-sec"   style="display:none"></div>
    <div id="filings-table"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- TAB: HK BUYBACK                                                           -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-hk" class="tab-panel">

  <div class="filters">
    <div class="filter-group">
      <label>公司</label>
      <select id="hk-f-company">
        <option value="">全部公司</option>
      </select>
    </div>
    <div class="filter-group">
      <label>交易日期 起</label>
      <input type="date" id="hk-f-date-from" />
    </div>
    <div class="filter-group">
      <label>交易日期 止</label>
      <input type="date" id="hk-f-date-to" />
    </div>
    <div class="filter-group">
      <label>回购市场</label>
      <select id="hk-f-market">
        <option value="">全部市场</option>
        <option value="hk">港交所</option>
        <option value="us">美股（NYSE / Nasdaq）</option>
      </select>
    </div>
    <div class="filter-group">
      <label>统计周期</label>
      <select id="hk-f-period">
        <option value="day">按日</option>
        <option value="week">按周</option>
        <option value="month">按月</option>
      </select>
    </div>
    <button class="btn-reset" onclick="resetHkFilters()">清除筛选</button>
    <button class="btn-download" onclick="downloadHK()">↓ 导出 CSV</button>
  </div>

  <div class="stats-bar" id="hk-stats-bar">
    <span>显示 <strong id="hk-count-visible">—</strong> 条，共 <strong id="hk-count-total">—</strong> 条</span>
    <span id="hk-agg-display"></span>
  </div>

  <div class="table-wrap">
    <div class="loading-msg" id="loading-hk">正在加载数据…</div>
    <div class="error-msg"   id="error-hk"   style="display:none"></div>
    <div id="buybacks-table"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- TAB: 南向资金流向                                                         -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-flow" class="tab-panel">
<div class="hk-panel">

  <div class="card">
    <div class="controls">
      <div class="ctrl-group">
        <span class="ctrl-label">显示区间：</span>
        <div class="btn-group" id="hkf-range-btns">
          <button class="hk-btn" data-days="90">3月</button>
          <button class="hk-btn" data-days="180">6月</button>
          <button class="hk-btn active" data-days="365">1年</button>
          <button class="hk-btn" data-days="0">全部</button>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">渠道：</span>
        <div class="btn-group" id="hkf-channel-btns">
          <button class="hk-btn active" data-ch="both">沪港通+深港通</button>
          <button class="hk-btn" data-ch="hu">沪港通</button>
          <button class="hk-btn" data-ch="shen">深港通</button>
        </div>
      </div>
      <div class="ctrl-group" style="margin-left:auto">
        <span class="ctrl-label" id="hkf-date-info" style="color:#888;font-size:12px"></span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">南向每日净买入（亿港元）</div>
    <div id="hkf-chart-net" class="chart-box" style="position:relative"></div>
  </div>

  <div class="card">
    <div class="card-title">南向买入额 / 卖出额（亿港元）</div>
    <div id="hkf-chart-buysell" class="chart-box" style="position:relative"></div>
  </div>

</div>
</div>

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!-- TAB: 个股持仓                                                             -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="tab-stocks" class="tab-panel">
<div class="hk-panel">

  <!-- 顶部：多股折线图 + 行业汇总表 -->
  <div class="card">
    <div class="hk-top-inner">
      <div class="hk-chart-col">
        <div class="card-title" id="hks-chart-title" style="margin-bottom:6px">
          点击下方股票查看南向持仓比例历史（最多同时选8只）
        </div>
        <div id="hks-sel-chips" class="sel-chips" style="margin-bottom:8px"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// SHARED UTILITIES
// ════════════════════════════════════════════════════════════════════════════

function fmtDate(d) { return d ? d.replace(/-/g, '/') : '—'; }
function fmtShares(n) {
  if (n == null) return '<span class="muted">—</span>';
  return `<span class="num">${n.toLocaleString('en-US')}</span>`;
}
function fmtPct(n, digits) {
  if (n == null) return '<span class="muted">—</span>';
  return `<span class="num">${n.toFixed(digits ?? 1)}%</span>`;
}
function fmtPrice(n, prefix) {
  if (n == null) return '<span class="muted">—</span>';
  return `<span class="num">${prefix ?? '$'}${n.toFixed(2)}</span>`;
}
function fmtDeltaShares(n) {
  if (n == null) return '<span class="muted">—</span>';
  if (n === 0)   return '<span class="delta-flat">—</span>';
  const cls = n > 0 ? 'delta-up' : 'delta-down';
  return `<span class="${cls} num">${n > 0 ? '▲ +' : '▼ '}${n.toLocaleString('en-US')}</span>`;
}
function fmtDeltaPct(n) {
  if (n == null) return '<span class="muted">—</span>';
  if (n === 0)   return '<span class="delta-flat">—</span>';
  const cls = n > 0 ? 'delta-up' : 'delta-down';
  return `<span class="${cls} num">${n > 0 ? '▲ +' : '▼ '}${n.toFixed(1)}%</span>`;
}

// ════════════════════════════════════════════════════════════════════════════

let hkLoaded = false, hkFlowLoaded = false, hkStocksLoaded = false;

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('meta-sec').style.display = name === 'sec' ? '' : 'none';

  if (name === 'hk' && !hkLoaded) { hkLoaded = true; initHK(); }
  if (name === 'flow'   && !hkFlowLoaded)   { hkFlowLoaded = true;   initHkFlow(); }
  if (name === 'stocks' && !hkStocksLoaded) { hkStocksLoaded = true; initHkStocks(); }
}

// ════════════════════════════════════════════════════════════════════════════
// SEC TAB
// ════════════════════════════════════════════════════════════════════════════

const TX_LABELS = { M: 'RSU行权', S: '卖出', P: '买入', F: '税款代扣', A: '授予', G: '赠与' };

function badgeClass(form) {
  switch ((form || '').toUpperCase()) {
    case 'SC 13G':   return 'badge-13g';
    case 'SC 13G/A': return 'badge-13g-a';
    case 'SC 13D':   return 'badge-13d';
    case 'SC 13D/A': return 'badge-13d-a';
    case '4': case '4/A': return 'badge-4';
    default: return 'badge-other';
  }
}
function txBadge(code) {
  if (!code) return '';
  const label = TX_LABELS[code] || code;
  const cls   = code === 'S' ? 'badge-13d' : code === 'P' ? 'badge-13g' : 'badge-other';
  return ` <span class="badge ${cls}" style="font-size:10px">${label}</span>`;
}
function fmtTxShares(n) {
  if (n == null) return '<span class="muted">—</span>';
  if (n === 0)   return '<span class="delta-flat">—</span>';
  const cls = n > 0 ? 'delta-up' : 'delta-down';
  return `<span class="${cls} num">${n > 0 ? '▲ +' : '▼ '}${n.toLocaleString('en-US')}</span>`;
}

let secTable = null;

function applySecFilters() {
  if (!secTable) return;
  const ticker   = document.getElementById('f-ticker').value;
  const form     = document.getElementById('f-form').value;
  const dateFrom = document.getElementById('f-date-from').value;
  const dateTo   = document.getElementById('f-date-to').value;
  const filerQ   = document.getElementById('f-filer').value.trim().toLowerCase();
  secTable.setFilter(row => {
    if (ticker   && row.ticker    !== ticker)  return false;
    if (form     && row.formType  !== form)    return false;
    if (dateFrom && row.filedDate < dateFrom)  return false;
    if (dateTo   && row.filedDate > dateTo)    return false;
    if (filerQ   && !(row.filerName || '').toLowerCase().includes(filerQ)) return false;
    return true;
  });
  updateSecCount();
}
function resetSecFilters() {
  ['f-ticker','f-form','f-date-from','f-date-to'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-filer').value = '';
  if (secTable) { secTable.clearFilter(); updateSecCount(); }
}
function updateSecCount() {
  document.getElementById('count-visible').textContent =
    (secTable ? secTable.getDataCount('active') : 0).toLocaleString();
}

function downloadSEC() {
  if (!secTable) return;
  const today = new Date().toISOString().slice(0, 10);
  secTable.download('csv', `sec_filings_${today}.csv`, { bom: true });
}

async function initSEC() {
  try {
    const res = await fetch('./data/filings.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const allData = json.filings || [];

    const lastUpdated = json.lastUpdated
      ? new Date(json.lastUpdated).toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'})

      `SEC 更新：<span>${lastUpdated}</span>&nbsp;&nbsp;共 <span>${json.totalCount || allData.length}</span> 条`;

        { title: '公司', field: 'company', width: 155,

        { title: '职务', field: 'insiderTitle', width: 155,
          formatter: cell => { const v = cell.getValue(); return v ? `<span class="muted" title="${v}" style="font-size:11px">${v}</span>` : '<span class="muted">—</span>'; }},
        { title: '持股数', field: 'sharesOwned', width: 130, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtShares(cell.getValue()) },
        { title: '占所披露Class总股本', field: 'pctOwned', width: 120, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtPct(cell.getValue()) },
        { title: 'Form4披露', cssClass: 'col-group-form4', columns: [
          { title: '本次交易股数', field: 'txShares', width: 130, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number', cssClass: 'col-form4',
            formatter: cell => fmtTxShares(cell.getValue()) },
          { title: '成交价', field: 'txPrice', width: 80, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number', cssClass: 'col-form4',
            formatter: cell => fmtPrice(cell.getValue()) },

        { title: '13D&G披露', cssClass: 'col-group-13dg', columns: [
          { title: '股数变动', field: 'sharesDelta', width: 140, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number', cssClass: 'col-13dg',
            formatter: cell => fmtDeltaShares(cell.getValue()) },
          { title: '% 变动', field: 'pctDelta', width: 85, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number', cssClass: 'col-13dg',
            formatter: cell => fmtDeltaPct(cell.getValue()) },
        ]},
        { title: '原文', field: 'edgarUrl', width: 72, hozAlign: 'center', headerSort: false,
          formatter: cell => {
            const url = cell.getValue();
            if (!url) return '—';
            return `<a class="edgar-link" href="${url}" target="_blank" rel="noopener">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                      </svg>EDGAR</a>`;
          }}
      ]
    });

    ['f-ticker','f-form','f-date-from','f-date-to'].forEach(id =>
      document.getElementById(id).addEventListener('change', applySecFilters));
    document.getElementById('f-filer').addEventListener('input', applySecFilters);
    secTable.on('dataFiltered', updateSecCount);

  } catch (e) {

}

// ════════════════════════════════════════════════════════════════════════════
// HK BUYBACK TAB
// ════════════════════════════════════════════════════════════════════════════

let hkTable = null;
let hkAllData = [];

function isHKMarket(method) {
  const m = (method || '').toLowerCase();
  return m.includes('exchange') && !m.includes('stock exchange') ||
         m === 'exchange';
}

function marketBadge(method) {
  const m = (method || '');
  if (m === 'Exchange') return '<span class="badge badge-hk">港交所</span>';
  if (m.toLowerCase().includes('nasdaq'))  return '<span class="badge badge-us">Nasdaq</span>';
  if (m.toLowerCase().includes('new york') || m.toLowerCase().includes('nyse'))
    return '<span class="badge badge-us">NYSE</span>';
  return `<span class="badge badge-other">${m || '—'}</span>`;
}

function getCurrency(row) {
  if (row.currency) return row.currency;
  return isHKMarket(row.method) ? 'HKD' : 'USD';
}

function fmtMoney(n, currency) {
  if (n == null) return '<span class="muted">—</span>';
  const sym = currency || 'HKD';
  if (n >= 1e8) return `<span class="num">${sym} ${(n / 1e8).toFixed(3)} 亿</span>`;
  if (n >= 1e6) return `<span class="num">${sym} ${(n / 1e6).toFixed(2)}M</span>`;
  return `<span class="num">${sym} ${n.toLocaleString()}</span>`;
}

let currentPeriod = 'day';

function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  d.setDate(d.getDate() + (day === 0 ? -6 : 1 - day)); // shift to Monday
  // 手动格式化，避免 toISOString() 在 UTC+8 把日期倒退一天
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function fmtPeriodDate(val) {
  if (!val) return '—';
  if (currentPeriod === 'month') {
    const [y, m] = val.split('-');
    return `${y}年${parseInt(m)}月`;
  }
  if (currentPeriod === 'week') {
    const mon = new Date(val + 'T00:00:00');
    const sun = new Date(mon); sun.setDate(mon.getDate() + 6); // 周一 + 6 = 周日
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    return `${fmt(mon)}–${fmt(sun)}`;
  }
  return fmtDate(val);
}

function aggregateData(data, period) {
  const groups = {};
  data.forEach(r => {
    const cur = getCurrency(r);
    const pk  = period === 'week' ? getWeekStart(r.tradingDate) : r.tradingDate.slice(0, 7);
    const key = `${r.stockCode}-${pk}-${cur}`;
    if (!groups[key]) {
      groups[key] = {
        id: key, stockCode: r.stockCode, companyCN: r.companyCN, companyEN: r.companyEN,
        tradingDate: pk, currency: cur, shares: 0, priceHigh: null, priceLow: null,
        aggregateHKD: 0, method: r.method, mandatePct: null, _lastDate: '',
      };
    }
    const g = groups[key];
    g.shares        += (r.shares || 0);
    g.aggregateHKD  += (r.aggregateHKD || 0);
    if (r.priceHigh != null) g.priceHigh = g.priceHigh == null ? r.priceHigh : Math.max(g.priceHigh, r.priceHigh);
    if (r.priceLow  != null) g.priceLow  = g.priceLow  == null ? r.priceLow  : Math.min(g.priceLow,  r.priceLow);
    if (r.tradingDate > g._lastDate) { g._lastDate = r.tradingDate; g.mandatePct = r.mandatePct; }
  });
  return Object.values(groups)
    .sort((a, b) => b.tradingDate.localeCompare(a.tradingDate) || a.companyCN.localeCompare(b.companyCN));
}

function applyHkFilters() {
  if (!hkTable) return;
  const company  = document.getElementById('hk-f-company').value;
  const dateFrom = document.getElementById('hk-f-date-from').value;
  const dateTo   = document.getElementById('hk-f-date-to').value;
  const market   = document.getElementById('hk-f-market').value;
  currentPeriod  = document.getElementById('hk-f-period').value;

  const filtered = hkAllData.filter(r => {
    if (company  && r.companyCN !== company)       return false;
    if (dateFrom && r.tradingDate < dateFrom)      return false;
    if (dateTo   && r.tradingDate > dateTo)        return false;
    if (market === 'hk' && !isHKMarket(r.method)) return false;
    if (market === 'us' &&  isHKMarket(r.method)) return false;
    return true;
  });
  hkTable.setData(currentPeriod === 'day' ? filtered : aggregateData(filtered, currentPeriod));
  updateHkStats();
}

function resetHkFilters() {
  document.getElementById('hk-f-company').value = '';
  document.getElementById('hk-f-market').value  = '';
  document.getElementById('hk-f-period').value  = 'day';
  ['hk-f-date-from','hk-f-date-to'].forEach(id => document.getElementById(id).value = '');
  currentPeriod = 'day';
  if (hkTable) { hkTable.setData(hkAllData); updateHkStats(); }
}

function updateHkStats() {
  if (!hkTable) return;
  const visible = hkTable.getDataCount('active');
  document.getElementById('hk-count-visible').textContent = visible.toLocaleString();

  const rows = hkTable.getData('active');
  let hkdTotal = 0, usdTotal = 0;
  rows.forEach(r => {
    if (!r.aggregateHKD) return;
    if (getCurrency(r) === 'USD') usdTotal += r.aggregateHKD;
    else hkdTotal += r.aggregateHKD;
  });
  const el = document.getElementById('hk-agg-display');
  const parts = [];
  if (hkdTotal > 0) parts.push(`HKD ${(hkdTotal / 1e8).toFixed(2)} 亿`);
  if (usdTotal > 0) parts.push(`USD ${(usdTotal / 1e8).toFixed(2)} 亿`);
  el.innerHTML = parts.length ? `筛选合计：<strong>${parts.join(' + ')}</strong>` : '';
}

function downloadHK() {
  if (!hkTable) return;
  const period = document.getElementById('hk-f-period').value;
  const suffix = period === 'week' ? '_weekly' : period === 'month' ? '_monthly' : '_daily';
  const today  = new Date().toISOString().slice(0, 10);
  hkTable.download('csv', `hk_buybacks${suffix}_${today}.csv`, { bom: true });
}

async function initHK() {
  try {
    const res = await fetch('./data/hk-buybacks.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    hkAllData = json.buybacks || [];

    document.getElementById('hk-count-total').textContent = (json.totalCount || hkAllData.length).toLocaleString();

    // Populate company dropdown (sorted by CN name)
    const companies = [...new Set(hkAllData.map(r => r.companyCN))].sort();
    const sel = document.getElementById('hk-f-company');
    companies.forEach(cn => {
      const opt = document.createElement('option');
      opt.value = cn;
      const row = hkAllData.find(r => r.companyCN === cn);
      opt.textContent = `${row.stockCode} ${cn}`;
      sel.appendChild(opt);
    });

    document.getElementById('loading-hk').style.display = 'none';

    hkTable = new Tabulator('#buybacks-table', {
      data: hkAllData,
      layout: 'fitDataFill',
      height: 'calc(100vh - 260px)',
      placeholder: '没有符合筛选条件的记录',
      initialSort: [{ column: 'tradingDate', dir: 'desc' }],
      headerWordWrap: true,
      columns: [
        { title: '交易日期', field: 'tradingDate', width: 115, sorter: 'string',
          formatter: cell => `<span class="num">${fmtPeriodDate(cell.getValue())}</span>` },
        { title: '公司', field: 'companyCN', minWidth: 130,
          formatter: cell => {
            const row = cell.getRow().getData();
            return `<span class="ticker-pill">${row.stockCode}</span>${cell.getValue()}`;
          }},
        { title: '回购股数', field: 'shares', width: 130, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtShares(cell.getValue()) },
        { title: '最高价', field: 'priceHigh', width: 115, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtPrice(cell.getValue(), getCurrency(cell.getRow().getData()) + ' ') },
        { title: '最低价', field: 'priceLow',  width: 115, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtPrice(cell.getValue(), getCurrency(cell.getRow().getData()) + ' ') },
        { title: '总金额', field: 'aggregateHKD', width: 140, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtMoney(cell.getValue(), getCurrency(cell.getRow().getData())) },
        { title: '回购市场', field: 'method', width: 110,
          formatter: cell => marketBadge(cell.getValue()) },
        { title: '本期回购计划累计回购额 / 总股本 %', field: 'mandatePct', width: 180, hozAlign: 'right', headerHozAlign: 'right', sorter: 'number',
          formatter: cell => fmtPct(cell.getValue(), 3) },
      ]
    });

    ['hk-f-company','hk-f-date-from','hk-f-date-to','hk-f-market','hk-f-period'].forEach(id =>
      document.getElementById(id).addEventListener('change', applyHkFilters));
    hkTable.on('dataFiltered', updateHkStats);
    updateHkStats();

  } catch (e) {
    document.getElementById('loading-hk').style.display = 'none';
    document.getElementById('error-hk').style.display = 'block';
    document.getElementById('error-hk').textContent = '数据加载失败：' + e.message;
  }
}

// HK CONNECT — SHARED UTILITIES
// ════════════════════════════════════════════════════════════════════════════

function hkFmt(v, d, suf) {
  if (v == null || !isFinite(v)) return '-';
  return v.toFixed(d) + (suf || '');
}
function hkFmtSign(v, d) {
  if (v == null || !isFinite(v)) return '-';
  return (v > 0 ? '+' : '') + v.toFixed(d);
}
function hkColorCls(v) { return v == null ? 'flat' : v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
function hkEsc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════════════════════════════
// TAB 3: 南向资金流向
// ════════════════════════════════════════════════════════════════════════════

let hkFlowData = null;
let hkFlowDays = 365;
let hkFlowChannel = 'both';

function initHkFlow() {
  // 区间按钮
  document.querySelectorAll('#hkf-range-btns .hk-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#hkf-range-btns .hk-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      hkFlowDays = +btn.dataset.days;
      hkFlowRender();
    });
  });
  // 渠道按钮
  document.querySelectorAll('#hkf-channel-btns .hk-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#hkf-channel-btns .hk-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      hkFlowChannel = btn.dataset.ch;
      hkFlowRender();
    });
  });

  fetch('data/hkdata/flow.json', {cache:'no-cache'})
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      hkFlowData = data;
      const latest = [...(data.hu||[]),...(data.shen||[])].map(d=>d.date).sort().slice(-1)[0]||'';
      document.getElementById('hkf-date-info').textContent = latest ? '数据截至：' + latest : '';
      hkFlowRender();
    })
    .catch(e => {
      document.getElementById('hkf-chart-net').innerHTML =
        `<div style="padding:20px;color:#c00;font-size:13px">加载失败：${e.message}</div>`;
    });

  window.addEventListener('resize', () => { if (hkFlowData) hkFlowRender(); });
}

function hkFlowFilterDays(arr) {
  if (!hkFlowDays) return arr;
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - hkFlowDays);
  const cutStr = cutoff.toISOString().slice(0, 10);
  return arr.filter(d => d.date >= cutStr);
}

function hkFlowMerge() {
  if (!hkFlowData) return [];
  const hu   = hkFlowChannel !== 'shen' ? hkFlowFilterDays(hkFlowData.hu   || []) : [];
  const shen = hkFlowChannel !== 'hu'   ? hkFlowFilterDays(hkFlowData.shen || []) : [];
  const byDate = {};
  for (const d of hu)   byDate[d.date] = { net: d.net, buy: d.buy, sell: d.sell };
  for (const d of shen) {
    if (byDate[d.date]) { byDate[d.date].net += d.net; byDate[d.date].buy += d.buy; byDate[d.date].sell += d.sell; }
    else byDate[d.date] = { net: d.net, buy: d.buy, sell: d.sell };
  }
  return Object.keys(byDate).sort().map(date => ({ date, ...byDate[date] }));
}

function hkFlowRender() {
  const data = hkFlowMerge();
  if (!data.length) return;
  hkDrawBar(data);
  hkDrawLine(data);
}

function hkDrawBar(data) {
  const el = document.getElementById('hkf-chart-net');
  el.innerHTML = '';
  const W = el.clientWidth || 900, H = 300;
  const M = { top:20, right:20, bottom:60, left:64 };
  const iW = W-M.left-M.right, iH = H-M.top-M.bottom;

  const svg = d3.select(el).append('svg').attr('width',W).attr('height',H);
  const g = svg.append('g').attr('transform',`translate(${M.left},${M.top})`);

  const x = d3.scaleBand().domain(data.map(d=>d.date)).range([0,iW]).padding(0.1);
  const yExt = Math.max(Math.abs(d3.min(data,d=>d.net)), Math.abs(d3.max(data,d=>d.net))) * 1.1 || 1;
  const y = d3.scaleLinear().domain([-yExt, yExt]).nice().range([iH,0]);

  g.append('line').attr('x1',0).attr('x2',iW).attr('y1',y(0)).attr('y2',y(0))
    .attr('stroke','#ccc').attr('stroke-width',1);

  g.selectAll('rect').data(data).join('rect')
    .attr('x', d=>x(d.date))
    .attr('y', d=>d.net>=0 ? y(d.net) : y(0))
    .attr('width', x.bandwidth())
    .attr('height', d=>Math.abs(y(d.net)-y(0)))
    .attr('fill', d=>d.net>=0 ? '#d93025' : '#1e8e3e');

  const every = Math.max(1, Math.floor(data.length/12));
  g.append('g').attr('transform',`translate(0,${iH})`)
    .call(d3.axisBottom(x).tickValues(data.filter((_,i)=>i%every===0).map(d=>d.date)).tickSize(3))
    .selectAll('text').attr('transform','rotate(-30)').attr('text-anchor','end')
    .attr('dx','-0.5em').attr('dy','0.15em').style('font-size','11px');
  g.append('g').call(d3.axisLeft(y).ticks(6).tickFormat(d=>d+'亿'));

  const tip = d3.select(el).append('div').attr('class','d3-tip');
  g.selectAll('rect')
    .on('mousemove',(event,d)=>{
      const color = d.net>=0?'#d93025':'#1e8e3e';
      tip.style('display','block').style('left',(event.offsetX+12)+'px').style('top',(event.offsetY-28)+'px')
        .html(`${d.date}<br/>净买入：<b style="color:${color}">${d.net.toFixed(2)}</b> 亿`);
    }).on('mouseleave',()=>tip.style('display','none'));
}

function hkDrawLine(data) {
  const el = document.getElementById('hkf-chart-buysell');
  el.innerHTML = '';
  const W = el.clientWidth || 900, H = 300;
  const M = { top:30, right:20, bottom:60, left:64 };
  const iW = W-M.left-M.right, iH = H-M.top-M.bottom;

  const svg = d3.select(el).append('svg').attr('width',W).attr('height',H);
  const g = svg.append('g').attr('transform',`translate(${M.left},${M.top})`);

  const parseDate = d3.timeParse('%Y-%m-%d');
  const fmtDate  = d3.timeFormat('%Y-%m-%d');
  const dates = data.map(d=>parseDate(d.date));

  const x = d3.scaleTime().domain(d3.extent(dates)).range([0,iW]);
  const y = d3.scaleLinear().domain([0, d3.max(data,d=>Math.max(d.buy,d.sell))*1.05]).nice().range([iH,0]);

  const lineBuy  = d3.line().x((_,i)=>x(dates[i])).y(d=>y(d.buy)).defined(d=>d.buy!=null);
  const lineSell = d3.line().x((_,i)=>x(dates[i])).y(d=>y(d.sell)).defined(d=>d.sell!=null);

  g.append('path').datum(data).attr('fill','none').attr('stroke','#d93025').attr('stroke-width',1.5).attr('d',lineBuy);
  g.append('path').datum(data).attr('fill','none').attr('stroke','#1e8e3e').attr('stroke-width',1.5).attr('d',lineSell);

  [['买入额','#d93025'],['卖出额','#1e8e3e']].forEach(([label,color],i)=>{
    const lx = iW - 130 + i*65;
    g.append('line').attr('x1',lx).attr('x2',lx+16).attr('y1',-12).attr('y2',-12).attr('stroke',color).attr('stroke-width',2);
    g.append('text').attr('x',lx+20).attr('y',-8).text(label).style('font-size','12px').attr('fill','#555');
  });

  g.append('g').attr('transform',`translate(0,${iH})`)
    .call(d3.axisBottom(x).ticks(Math.min(data.length,12)).tickFormat(d=>fmtDate(d)))
    .selectAll('text').attr('transform','rotate(-30)').attr('text-anchor','end')
    .attr('dx','-0.5em').attr('dy','0.15em').style('font-size','11px');
  g.append('g').call(d3.axisLeft(y).ticks(6).tickFormat(d=>d+'亿'));

  const tipLine = g.append('line').attr('stroke','#999').attr('stroke-width',1).attr('y1',0).attr('y2',iH).style('display','none');
  const tip = d3.select(el).append('div').attr('class','d3-tip');
  svg.on('mousemove',function(event){
    const [mx] = d3.pointer(event, g.node());
    const x0 = x.invert(mx);
    const bisect = d3.bisector(d=>parseDate(d.date)).left;
    const i = bisect(data, x0, 1);
    if (i<=0||i>=data.length){tip.style('display','none');tipLine.style('display','none');return;}
    const d = data[i-1];
    tipLine.style('display',null).attr('x1',mx).attr('x2',mx);
    tip.style('display','block').style('left',(event.offsetX+12)+'px').style('top',(event.offsetY-40)+'px')
      .html(`${d.date}<br/>买入额：<b style="color:#d93025">${d.buy.toFixed(2)}</b> 亿<br/>卖出额：<b style="color:#1e8e3e">${d.sell.toFixed(2)}</b> 亿`);
  }).on('mouseleave',()=>{tip.style('display','none');tipLine.style('display','none');});
}

// ════════════════════════════════════════════════════════════════════════════
// TAB 4: 个股持仓
// ════════════════════════════════════════════════════════════════════════════

const HKS_COLORS = ['#1a73e8','#d93025','#1e8e3e','#e37400','#9334e6','#00796b','#c2185b','#546e7a'];
const HKS_MAX_SEL = 8;

let hksRankData   = null;
let hksPeriod     = '1d';
let hksSortCol    = 'net_value';
let hksSortDir    = -1;
let hksFilterInds = new Set();
let hksSearchQ    = '';
const hksSelected  = new Map();
const hksColorUsed = new Set();
const hksCache     = {};

function hksNextColor() {
  for (let i=0;i<HKS_COLORS.length;i++) if (!hksColorUsed.has(i)) return i;
  return 0;
}

function hksIndSummary(rows) {
  const map = {};
  for (const r of rows) {
    const ind = (r.gics_l1 && r.gics_l2) ? r.gics_l1 + '-' + r.gics_l2 : (r.gics_l1 || r.gics_l2 || '其他');
    if (!map[ind]) map[ind] = {net_value:0, count:0};
    map[ind].net_value += r.net_value||0;
    map[ind].count++;
  }
  return Object.entries(map).map(([industry,v])=>({industry,...v})).sort((a,b)=>b.net_value-a.net_value);
}

function initHkStocks() {
  // 周期按钮
  document.querySelectorAll('#hks-period-btns .hk-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#hks-period-btns .hk-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      hksPeriod = btn.dataset.period;
      hksFilterInds.clear();
      hksClearInds();
      hksRenderAll();
    });
  });

  // 表头排序
  document.querySelectorAll('#tab-stocks th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      hksSortDir = (hksSortCol===col) ? -hksSortDir : -1;
      hksSortCol = col;
      document.querySelectorAll('#tab-stocks th.sortable').forEach(t=>t.classList.remove('sort-asc','sort-desc'));
      th.classList.add(hksSortDir===-1?'sort-desc':'sort-asc');
      hksRenderTable();
    });
  });

  // 点击外部关闭下拉
  document.addEventListener('click', e => {
    const dd = document.getElementById('hks-ind-dropdown');
    if (dd && !dd.contains(e.target))
      document.getElementById('hks-ind-dd-panel').style.display = 'none';
  });

  fetch('data/hkdata/ranking.json', {cache:'no-cache'})
    .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(data=>{
      hksRankData = data;
      hksBuildIndDropdown();
      hksRenderAll();
    })
    .catch(e=>{
      document.getElementById('hks-ranking-tbody').innerHTML =
        `<tr><td colspan="9" style="text-align:center;padding:40px;color:#c00">数据加载失败：${e.message}</td></tr>`;
      document.getElementById('hks-ind-summary-tbody').innerHTML = '';
    });

  window.addEventListener('resize', ()=>{ if (hksSelected.size) hksDrawMulti(); });
}

function hksRenderAll() {
  if (!hksRankData) return;
  hksRenderIndSummary();
  hksRenderTable();
}

// 行业汇总小表（右侧）
function hksRenderIndSummary() {
  const rows = hksRankData[hksPeriod]||[];
  const summary = hksIndSummary(rows);
  const tbody = document.getElementById('hks-ind-summary-tbody');
  if (!summary.length) { tbody.innerHTML=''; return; }
  tbody.innerHTML = summary.map(d=>{
    const v = d.net_value/1e8;
    const sign=v>=0?'+':''; const color=v>=0?'#d93025':'#1e8e3e';
    const active=hksFilterInds.has(d.industry)?' class="ind-active"':'';
    return `<tr${active} onclick="hksToggleIndFromTable('${hkEsc(d.industry)}')">
      <td style="color:#444">${hkEsc(d.industry)}<span style="color:#bbb;font-size:11px;margin-left:4px">${d.count}</span></td>
      <td class="hk-ind-val" style="color:${color}">${sign}${v.toFixed(1)}</td>
    </tr>`;
  }).join('');
}

// 行业下拉
function hksBuildIndDropdown() {
  const allInds = new Set();
  for (const key of ['1d','1w','1m','3m','6m','1y'])
    for (const r of (hksRankData[key]||[])) allInds.add((r.gics_l1 && r.gics_l2) ? r.gics_l1+'-'+r.gics_l2 : (r.gics_l1||r.gics_l2||'其他'));
  const inds = [...allInds].sort((a,b)=>a.localeCompare(b,'zh'));
  document.getElementById('hks-ind-dd-list').innerHTML = inds.map(ind=>
    `<label class="hk-ind-dd-item">
       <input type="checkbox" value="${hkEsc(ind)}" onchange="hksOnIndCheck(this)">
       <span>${hkEsc(ind)}</span>
     </label>`
  ).join('');
}

function hksToggleIndDropdown(e) {
  e.stopPropagation();
  const p = document.getElementById('hks-ind-dd-panel');
  p.style.display = p.style.display==='none' ? 'flex' : 'none';
}
function hksOnIndCheck(cb) {
  if (cb.checked) hksFilterInds.add(cb.value); else hksFilterInds.delete(cb.value);
  hksUpdateIndLabel();
  hksRenderIndSummary();
  hksRenderTable();
}
function hksSelectAllInds() {
  document.querySelectorAll('#hks-ind-dd-list input[type=checkbox]').forEach(cb=>{cb.checked=true;hksFilterInds.add(cb.value);});
  hksUpdateIndLabel(); hksRenderIndSummary(); hksRenderTable();
}
function hksClearInds() {
  document.querySelectorAll('#hks-ind-dd-list input[type=checkbox]').forEach(cb=>cb.checked=false);
  hksFilterInds.clear();
  hksUpdateIndLabel(); hksRenderIndSummary(); hksRenderTable();
}
function hksUpdateIndLabel() {
  const btn = document.getElementById('hks-ind-dd-btn');
  const lbl = document.getElementById('hks-ind-dd-label');
  if (hksFilterInds.size===0) { lbl.textContent='全部行业'; btn.classList.remove('has-filter'); }
  else { lbl.textContent=`已选 ${hksFilterInds.size} 个行业`; btn.classList.add('has-filter'); }
}
function hksToggleIndFromTable(ind) {
  const cb = document.querySelector(`#hks-ind-dd-list input[value="${CSS.escape(ind)}"]`);
  if (hksFilterInds.has(ind)) { hksFilterInds.delete(ind); if(cb) cb.checked=false; }
  else { hksFilterInds.add(ind); if(cb) cb.checked=true; }
  hksUpdateIndLabel(); hksRenderIndSummary(); hksRenderTable();
}
function hksOnSearch(val) { hksSearchQ=val.trim().toLowerCase(); hksRenderTable(); }

// 渲染表格
function hksRenderTable() {
  if (!hksRankData) return;
  let rows = [...(hksRankData[hksPeriod]||[])];
  if (hksFilterInds.size>0) rows=rows.filter(r=>hksFilterInds.has((r.gics_l1&&r.gics_l2)?r.gics_l1+'-'+r.gics_l2:(r.gics_l1||r.gics_l2||'其他')));
  if (hksSearchQ) rows=rows.filter(r=>r.code.toLowerCase().includes(hksSearchQ)||r.name.toLowerCase().includes(hksSearchQ));

  rows.sort((a,b)=>{
    let va=a[hksSortCol], vb=b[hksSortCol];
    if (typeof va==='string') return hksSortDir*va.localeCompare(vb,'zh');
    va=va??-Infinity; vb=vb??-Infinity;
    return hksSortDir*(va-vb);
  });

  const total=(hksRankData[hksPeriod]||[]).length;
  const parts=[];
  if (hksFilterInds.size>0) parts.push(`已选 ${hksFilterInds.size} 个行业`);
  if (hksSearchQ) parts.push(`"${hksSearchQ}"`);
  document.getElementById('hks-stock-count').textContent =
    parts.length ? `${rows.length} / ${total} 只（${parts.join('，')}）` : `共 ${total} 只股票`;

  const tbody=document.getElementById('hks-ranking-tbody');
  if (!rows.length) {
    tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:40px;color:#888">暂无符合条件的股票</td></tr>';
    return;
  }
  tbody.innerHTML=rows.map((row,i)=>{
    const netVal   = row.net_value!=null  ? (row.net_value/1e8).toFixed(2) : '-';
    const netShrs  = row.net_shares!=null ? (row.net_shares/1e4).toFixed(1) : '-';
    const isSel=hksSelected.has(row.code);
    const ci=isSel?hksSelected.get(row.code).colorIdx:-1;
    const color=isSel?HKS_COLORS[ci]:'';
    const selCls=isSel?' selected':'';
    const styleAttr=isSel?` style="--row-color:${color}"`:'';
    return `<tr class="${selCls}"${styleAttr} onclick="hksToggleStock('${row.code}','${hkEsc(row.name)}')">
      <td style="color:#bbb;text-align:right">${i+1}</td>
      <td class="code">${row.code}</td>
      <td>${hkEsc(row.name)}</td>
      <td style="color:#555">${hkEsc(row.gics_l2||'')}</td>
      <td style="text-align:right">${hkFmt(row.close,3)}</td>
      <td style="text-align:right">${hkFmt(row.pct,2,'%')}</td>
      <td style="text-align:right" class="${hkColorCls(row.net_value)}">${row.net_value>0?'+':''}${netVal}</td>
      <td style="text-align:right" class="${hkColorCls(row.pct_chg)}">${hkFmtSign(row.pct_chg,4)}</td>
      <td style="text-align:right" class="${hkColorCls(row.net_shares)}">${row.net_shares>0?'+':''}${netShrs}</td>
    </tr>`;
  }).join('');
}

// 股票选择
function hksToggleStock(code, name) {
  if (hksSelected.has(code)) {
    const {colorIdx}=hksSelected.get(code);
    hksColorUsed.delete(colorIdx); hksSelected.delete(code);
    hksRenderTable(); hksRenderChips(); hksDrawMulti(); return;
  }
  if (hksSelected.size>=HKS_MAX_SEL) { alert(`最多同时选择 ${HKS_MAX_SEL} 只股票`); return; }
  const colorIdx=hksNextColor();
  hksColorUsed.add(colorIdx); hksSelected.set(code,{name,colorIdx});
  hksRenderTable(); hksRenderChips();
  if (hksCache[code]!==undefined) { hksDrawMulti(); }
  else {
    hksDrawMulti();
    fetch(`data/hkdata/stocks/${code}.json`, {cache:'no-cache'})
      .then(r=>{if(!r.ok)throw new Error('404');return r.json();})
      .then(data=>{hksCache[code]=data;hksDrawMulti();})
      .catch(()=>{hksCache[code]=null;hksDrawMulti();});
  }
}
function hksDeselectStock(code) {
  if (!hksSelected.has(code)) return;
  const {colorIdx}=hksSelected.get(code);
  hksColorUsed.delete(colorIdx); hksSelected.delete(code);
  hksRenderTable(); hksRenderChips(); hksDrawMulti();
}
function hksRenderChips() {
  const el=document.getElementById('hks-sel-chips');
  if (hksSelected.size===0){el.innerHTML='';return;}
  el.innerHTML=[...hksSelected.entries()].map(([code,{name,colorIdx}])=>
    `<span class="sel-chip" style="background:${HKS_COLORS[colorIdx]}" onclick="hksDeselectStock('${code}')">
       <span>${name}（${code}）</span><span class="rm">✕</span>
     </span>`
  ).join('');
}

// D3 多股折线图
function hksDrawMulti() {
  const el=document.getElementById('hks-stock-chart');
  if (hksSelected.size===0) {
    el.innerHTML='<div class="chart-hint">← 请在列表中选择股票</div>';
    document.getElementById('hks-chart-title').textContent='点击下方股票查看南向持仓比例历史（最多同时选8只）';
    return;
  }
  const series=[]; let pending=0;
  for (const [code,{name,colorIdx}] of hksSelected) {
    if (hksCache[code]===undefined){pending++;continue;}
    if (hksCache[code]===null) continue;
    const parseD=d3.timeParse('%Y-%m-%d');
    const points=hksCache[code].dates.map((d,i)=>({date:parseD(d),pct:hksCache[code].pct[i]})).filter(p=>p.pct!=null&&p.date!=null);
    if (points.length) series.push({code,name,colorIdx,points});
  }
  const names=[...hksSelected.values()].map(v=>v.name);
  document.getElementById('hks-chart-title').textContent=names.join(' / ')+'  南向持仓比例历史'+(pending?'（加载中…）':'');

  if (series.length===0) {
    el.innerHTML=`<div class="chart-hint" style="color:#999">${pending?'数据加载中…':'暂无历史数据'}</div>`;
    return;
  }
  el.innerHTML='';
  const W=el.clientWidth||620, H=280;
  const M={top:16,right:16,bottom:56,left:56};
  const iW=W-M.left-M.right, iH=H-M.top-M.bottom;

  const svg=d3.select(el).append('svg').attr('width',W).attr('height',H);
  const g=svg.append('g').attr('transform',`translate(${M.left},${M.top})`);

  const allDates=series.flatMap(s=>s.points.map(p=>p.date));
  const allPcts =series.flatMap(s=>s.points.map(p=>p.pct));
  const fmtD=d3.timeFormat('%Y-%m-%d');
  const x=d3.scaleTime().domain(d3.extent(allDates)).range([0,iW]);
  const yMin=d3.min(allPcts), yMax=d3.max(allPcts);
  const yPad=(yMax-yMin)*0.08||0.5;
  const y=d3.scaleLinear().domain([yMin-yPad,yMax+yPad]).nice().range([iH,0]);

  g.append('g').attr('class','grid').call(d3.axisLeft(y).ticks(5).tickSize(-iW).tickFormat(''))
    .selectAll('line').attr('stroke','#eee');
  g.select('.grid .domain').remove();

  series.forEach(s=>{
    const line=d3.line().x(p=>x(p.date)).y(p=>y(p.pct)).curve(d3.curveMonotoneX);
    g.append('path').datum(s.points).attr('fill','none')
      .attr('stroke',HKS_COLORS[s.colorIdx]).attr('stroke-width',1.8).attr('d',line);
  });
  g.append('g').attr('transform',`translate(0,${iH})`)
    .call(d3.axisBottom(x).ticks(Math.min(8,Math.floor(iW/70))).tickFormat(d=>fmtD(d)))
    .selectAll('text').attr('transform','rotate(-30)').attr('text-anchor','end')
    .attr('dx','-0.5em').attr('dy','0.15em').style('font-size','11px');
  g.append('g').call(d3.axisLeft(y).ticks(5).tickFormat(d=>d+'%'));

  const tipLine=g.append('line').attr('stroke','#ccc').attr('stroke-width',1).attr('y1',0).attr('y2',iH).style('display','none');
  const tip=d3.select(el).append('div').attr('class','d3-tip');
  svg.on('mousemove',function(event){
    const [mx]=d3.pointer(event,g.node()); const x0=x.invert(mx);
    tipLine.style('display',null).attr('x1',mx).attr('x2',mx);
    let html=`<span style="color:#ccc">${fmtD(x0)}</span>`;
    series.forEach(s=>{
      const bis=d3.bisector(p=>p.date).left; const i=bis(s.points,x0,1);
      if(i<=0||i>=s.points.length)return;
      const d=x0-s.points[i-1].date>s.points[i].date-x0?s.points[i]:s.points[i-1];
      html+=`<br/><span style="color:${HKS_COLORS[s.colorIdx]}">■</span> ${s.name}：<b>${d.pct.toFixed(4)}%</b>`;
    });
    tip.style('display','block').style('left',(event.offsetX+14)+'px').style('top',(event.offsetY-10)+'px').html(html);
  }).on('mouseleave',()=>{tip.style('display','none');tipLine.style('display','none');});
}

// ── Boot ─────────────────────────────────────────────────────────────────────
initSEC();
</script>
</body>
</html>
