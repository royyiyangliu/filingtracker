<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>中概股持仓披露追踪</title>

  <!-- Tabulator v6 -->
  <link rel="stylesheet" href="https://unpkg.com/tabulator-tables@6.3.1/dist/css/tabulator.min.css" />
  <script src="https://unpkg.com/tabulator-tables@6.3.1/dist/js/tabulator.min.js"></script>

  <style>
    /* ── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f6fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ────────────────────────────────────────── */
    .header {
      background: #1a1a2e;
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .header-title { font-size: 20px; font-weight: 600; letter-spacing: 0.3px; }
    .header-sub { font-size: 13px; color: #9ba3bc; margin-top: 3px; }
    .header-meta { font-size: 12px; color: #9ba3bc; text-align: right; }
    .header-meta span { color: #e2e8f0; }

    /* ── Filter Bar ────────────────────────────────────── */
    .filters {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 14px 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
    }
    .filter-group select,
    .filter-group input[type="text"],
    .filter-group input[type="date"] {
      height: 34px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 13px;
      color: #1a1a2e;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .filter-group select { padding-right: 28px; cursor: pointer; }
    .filter-group select:focus,
    .filter-group input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.15); }
    .filter-group input[type="text"] { width: 220px; }
    .filter-group input[type="date"] { width: 140px; }
    .btn-reset {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      cursor: pointer;
      color: #64748b;
      transition: all .15s;
      align-self: flex-end;
    }
    .btn-reset:hover { background: #f1f5f9; border-color: #94a3b8; color: #1a1a2e; }

    /* ── Stats Bar ─────────────────────────────────────── */
    .stats-bar {
      padding: 10px 32px;
      font-size: 13px;
      color: #64748b;
      display: flex;
      gap: 20px;
      background: #f5f6fa;
    }
    .stats-bar strong { color: #1a1a2e; }

    /* ── Table Container ───────────────────────────────── */
    .table-wrap { padding: 0 24px 32px; overflow-x: auto; }

    /* ── Tabulator Overrides ───────────────────────────── */
    #filings-table .tabulator-header { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
    #filings-table .tabulator-header .tabulator-col { border-right: 1px solid #e9ecef; }
    #filings-table .tabulator-header .tabulator-col-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #475569; white-space: normal; line-height: 1.4; }
    #filings-table .tabulator-row { border-bottom: 1px solid #f1f5f9; }
    #filings-table .tabulator-row:hover { background: #f8faff !important; }
    #filings-table .tabulator-row.tabulator-row-even { background: #fafbfd; }
    #filings-table .tabulator-cell { font-size: 13px; padding: 9px 12px; color: #334155; vertical-align: middle; }

    /* ── Column Group: Form4披露 ───────────────────────────── */
    #filings-table .tabulator-col-group.col-group-form4 {
      background: #ecfdf5 !important;
      border-left: 2px solid #6ee7b7 !important;
    }
    #filings-table .tabulator-col-group.col-group-form4 .tabulator-col-title { color: #166534; }
    #filings-table .tabulator-col.col-form4 { border-left: 1px solid #d1fae5 !important; background: #f5fef7 !important; }
    #filings-table .tabulator-cell.col-form4 { background: rgba(236,253,245,0.35); }

    /* ── Column Group: 13D&G披露 ───────────────────────────── */
    #filings-table .tabulator-col-group.col-group-13dg {
      background: #eff6ff !important;
      border-left: 2px solid #93c5fd !important;
    }
    #filings-table .tabulator-col-group.col-group-13dg .tabulator-col-title { color: #1d4ed8; }
    #filings-table .tabulator-col.col-13dg { border-left: 1px solid #dbeafe !important; background: #f5f9ff !important; }
    #filings-table .tabulator-cell.col-13dg { background: rgba(239,246,255,0.35); }

    /* ── Form Type Badge ───────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-13g    { background: #dbeafe; color: #1d4ed8; }
    .badge-13g-a  { background: #eff6ff; color: #2563eb; }
    .badge-13d    { background: #fce7f3; color: #9d174d; }
    .badge-13d-a  { background: #fdf2f8; color: #be185d; }
    .badge-other  { background: #f1f5f9; color: #64748b; }
    .badge-4      { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }

    /* ── Ticker Pill ───────────────────────────────────── */
    .ticker-pill {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      background: #1a1a2e;
      color: #e2e8f0;
      margin-right: 6px;
      letter-spacing: 0.3px;
    }

    /* ── Delta Colors ──────────────────────────────────── */
    .delta-up   { color: #16a34a; font-weight: 500; }
    .delta-down { color: #dc2626; font-weight: 500; }
    .delta-flat { color: #94a3b8; }

    /* ── Number Cells ──────────────────────────────────── */
    .num { font-variant-numeric: tabular-nums; }
    .muted { color: #94a3b8; }

    /* ── EDGAR Link ────────────────────────────────────── */
    .edgar-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #3b82f6;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 8px;
      border: 1px solid #bfdbfe;
      border-radius: 4px;
      transition: all .15s;
    }
    .edgar-link:hover { background: #eff6ff; border-color: #93c5fd; }

    /* ── Loading / Error ───────────────────────────────── */
    #loading, #error {
      text-align: center;
      padding: 80px 32px;
      color: #64748b;
      font-size: 15px;
    }
    #error { color: #dc2626; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 768px) {
      .header, .filters, .stats-bar, .table-wrap { padding-left: 16px; padding-right: 16px; }
      .filter-group input[type="text"] { width: 180px; }
    }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div class="header">
  <div>
    <div class="header-title">中概股持仓披露追踪</div>
    <div class="header-sub">Schedule 13D/G · Form 4（内部人交易）· 17 家中概股 · 数据来源：SEC EDGAR</div>
  </div>
  <div class="header-meta" id="meta">加载中…</div>
</div>

<!-- ── Filters ─────────────────────────────────────────────────────────────── -->
<div class="filters">
  <div class="filter-group">
    <label>公司</label>
    <select id="f-ticker">
      <option value="">全部公司</option>
    </select>
  </div>
  <div class="filter-group">
    <label>表格类型</label>
    <select id="f-form">
      <option value="">全部类型</option>
      <option value="SC 13D">SC 13D（新增举牌）</option>
      <option value="SC 13D/A">SC 13D/A（修正）</option>
      <option value="SC 13G">SC 13G（新增被动）</option>
      <option value="SC 13G/A">SC 13G/A（修正）</option>
      <option value="4">Form 4（内部人交易）</option>
      <option value="4/A">Form 4/A（修正）</option>
    </select>
  </div>
  <div class="filter-group">
    <label>申报日期 起</label>
    <input type="date" id="f-date-from" />
  </div>
  <div class="filter-group">
    <label>申报日期 止</label>
    <input type="date" id="f-date-to" />
  </div>
  <div class="filter-group">
    <label>申报人搜索</label>
    <input type="text" id="f-filer" placeholder="股东 / 机构名称…" />
  </div>
  <button class="btn-reset" onclick="resetFilters()">清除筛选</button>
</div>

<!-- ── Stats ───────────────────────────────────────────────────────────────── -->
<div class="stats-bar">
  <span>显示 <strong id="count-visible">—</strong> 条，共 <strong id="count-total">—</strong> 条</span>
</div>

<!-- ── Table ───────────────────────────────────────────────────────────────── -->
<div class="table-wrap">
  <div id="loading">正在加载数据…</div>
  <div id="error" style="display:none"></div>
  <div id="filings-table"></div>
</div>

<script>
// ── 工具函数 ──────────────────────────────────────────────────────────────────

function badgeClass(form) {
  switch ((form || '').toUpperCase()) {
    case 'SC 13G':   return 'badge-13g';
    case 'SC 13G/A': return 'badge-13g-a';
    case 'SC 13D':   return 'badge-13d';
    case 'SC 13D/A': return 'badge-13d-a';
    case '4':
    case '4/A':      return 'badge-4';
    default:         return 'badge-other';
  }
}

const TX_LABELS = { M: 'RSU行权', S: '卖出', P: '买入', F: '税款代扣', A: '授予', G: '赠与' };
function txBadge(code) {
  if (!code) return '';
  const label = TX_LABELS[code] || code;
  const cls   = code === 'S' ? 'badge-13d' : code === 'P' ? 'badge-13g' : 'badge-other';
  return ` <span class="badge ${cls}" style="font-size:10px">${label}</span>`;
}

function fmtTxShares(n) {
  if (n == null) return '<span class="muted">—</span>';
  if (n === 0)   return '<span class="delta-flat">—</span>';
  const cls   = n > 0 ? 'delta-up' : 'delta-down';
  const arrow  = n > 0 ? '▲' : '▼';
  const sign   = n > 0 ? '+' : '';
  return `<span class="${cls} num">${arrow} ${sign}${n.toLocaleString('en-US')}</span>`;
}

function fmtPrice(n) {
  if (n == null) return '<span class="muted">—</span>';
  return `<span class="num">$${n.toFixed(2)}</span>`;
}

function fmtDate(d) {
  return d ? d.replace(/-/g, '/') : '—';
}

function fmtShares(n) {
  if (n == null) return '<span class="muted">—</span>';
  return `<span class="num">${n.toLocaleString('en-US')}</span>`;
}

function fmtPct(n) {
  if (n == null) return '<span class="muted">—</span>';
  return `<span class="num">${n.toFixed(1)}%</span>`;
}

function fmtDeltaShares(n) {
  if (n == null) return '<span class="muted">—</span>';
  if (n === 0)   return '<span class="delta-flat">—</span>';
  const cls  = n > 0 ? 'delta-up' : 'delta-down';
  const arrow = n > 0 ? '▲' : '▼';
  const sign  = n > 0 ? '+' : '';
  return `<span class="${cls} num">${arrow} ${sign}${n.toLocaleString('en-US')}</span>`;
}

function fmtDeltaPct(n) {
  if (n == null) return '<span class="muted">—</span>';
  if (n === 0)   return '<span class="delta-flat">—</span>';
  const cls  = n > 0 ? 'delta-up' : 'delta-down';
  const arrow = n > 0 ? '▲' : '▼';
  const sign  = n > 0 ? '+' : '';
  return `<span class="${cls} num">${arrow} ${sign}${n.toFixed(1)}%</span>`;
}

// ── 筛选状态 ──────────────────────────────────────────────────────────────────
let table = null;
let allData = [];

function applyFilters() {
  if (!table) return;
  const ticker   = document.getElementById('f-ticker').value;
  const form     = document.getElementById('f-form').value;
  const dateFrom = document.getElementById('f-date-from').value;
  const dateTo   = document.getElementById('f-date-to').value;
  const filerQ   = document.getElementById('f-filer').value.trim().toLowerCase();

  table.setFilter(row => {
    if (ticker   && row.ticker   !== ticker)   return false;
    if (form     && row.formType !== form)     return false;
    if (dateFrom && row.filedDate < dateFrom)  return false;
    if (dateTo   && row.filedDate > dateTo)    return false;
    if (filerQ   && !(row.filerName || '').toLowerCase().includes(filerQ)) return false;
    return true;
  });

  updateCount();
}

function resetFilters() {
  document.getElementById('f-ticker').value    = '';
  document.getElementById('f-form').value      = '';
  document.getElementById('f-date-from').value = '';
  document.getElementById('f-date-to').value   = '';
  document.getElementById('f-filer').value     = '';
  if (table) { table.clearFilter(); updateCount(); }
}

function updateCount() {
  const visible = table ? table.getDataCount('active') : 0;
  document.getElementById('count-visible').textContent = visible.toLocaleString();
}

// ── 初始化 ────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch('./data/filings.json?v=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    allData = json.filings || [];

    // 元数据
    const lastUpdated = json.lastUpdated
      ? new Date(json.lastUpdated).toLocaleDateString('zh-CN', {year:'numeric',month:'2-digit',day:'2-digit'})
      : '—';
    document.getElementById('meta').innerHTML =
      `数据更新：<span>${lastUpdated}</span>&nbsp;&nbsp;共 <span>${json.totalCount || allData.length}</span> 条记录`;
    document.getElementById('count-total').textContent = (json.totalCount || allData.length).toLocaleString();

    // 公司下拉
    const tickers = [...new Set(allData.map(f => f.ticker))].sort();
    const sel = document.getElementById('f-ticker');
    const companies = {};
    allData.forEach(f => { if (!companies[f.ticker]) companies[f.ticker] = f.company; });
    tickers.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = `${t} — ${companies[t] || t}`;
      sel.appendChild(opt);
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('filings-table').style.display = 'block';

    // Tabulator
    table = new Tabulator('#filings-table', {
      data: allData,
      layout: 'fitDataFill',
      height: 'calc(100vh - 240px)',
      placeholder: '没有符合筛选条件的记录',
      initialSort: [{ column: 'filedDate', dir: 'desc' }],
      columns: [
        {
          title: '申报日期',
          field: 'filedDate',
          width: 100,
          sorter: 'string',
          formatter: cell => `<span class="num">${fmtDate(cell.getValue())}</span>`
        },
        {
          title: '持仓截止',
          field: 'eventDate',
          width: 100,
          sorter: 'string',
          formatter: cell => {
            const v = cell.getValue();
            return v ? `<span class="num muted">${fmtDate(v)}</span>` : '<span class="muted">—</span>';
          }
        },
        {
          title: '公司',
          field: 'company',
          width: 155,
          formatter: (cell) => {
            const row  = cell.getRow().getData();
            const tick = `<span class="ticker-pill">${row.ticker}</span>`;
            const name = (row.company || '').replace(/,?\s*(Inc\.|Ltd|Group|Holdings?|Corp)\.?$/i, '');
            return tick + `<span title="${row.company}">${name}</span>`;
          }
        },
        {
          title: '表格类型',
          field: 'formType',
          width: 140,
          formatter: cell => {
            const row = cell.getRow().getData();
            const v = cell.getValue() || '';
            return `<span class="badge ${badgeClass(v)}">${v}</span>${txBadge(row.txCode)}`;
          }
        },
        {
          title: '申报人 / 股东',
          field: 'filerName',
          minWidth: 170,
          formatter: cell => {
            const v = cell.getValue() || '—';
            return `<span title="${v}">${v}</span>`;
          }
        },
        {
          title: '职务',
          field: 'insiderTitle',
          width: 155,
          formatter: cell => {
            const v = cell.getValue();
            return v ? `<span class="muted" title="${v}" style="font-size:11px">${v}</span>` : '<span class="muted">—</span>';
          }
        },
        {
          title: '持股数',
          field: 'sharesOwned',
          width: 130,
          hozAlign: 'right',
          headerHozAlign: 'right',
          sorter: 'number',
          formatter: cell => fmtShares(cell.getValue())
        },
        {
          title: '占所披露Class总股本',
          field: 'pctOwned',
          width: 120,
          hozAlign: 'right',
          headerHozAlign: 'right',
          sorter: 'number',
          formatter: cell => fmtPct(cell.getValue())
        },
        {
          title: 'Form4披露',
          cssClass: 'col-group-form4',
          columns: [
            {
              title: '本次交易股数',
              field: 'txShares',
              width: 130,
              hozAlign: 'right',
              headerHozAlign: 'right',
              sorter: 'number',
              cssClass: 'col-form4',
              formatter: cell => fmtTxShares(cell.getValue())
            },
            {
              title: '成交价',
              field: 'txPrice',
              width: 80,
              hozAlign: 'right',
              headerHozAlign: 'right',
              sorter: 'number',
              cssClass: 'col-form4',
              formatter: cell => fmtPrice(cell.getValue())
            },
          ]
        },
        {
          title: '13D&G披露',
          cssClass: 'col-group-13dg',
          columns: [
            {
              title: '股数变动',
              field: 'sharesDelta',
              width: 140,
              hozAlign: 'right',
              headerHozAlign: 'right',
              sorter: 'number',
              cssClass: 'col-13dg',
              formatter: cell => fmtDeltaShares(cell.getValue())
            },
            {
              title: '% 变动',
              field: 'pctDelta',
              width: 85,
              hozAlign: 'right',
              headerHozAlign: 'right',
              sorter: 'number',
              cssClass: 'col-13dg',
              formatter: cell => fmtDeltaPct(cell.getValue())
            },
          ]
        },
        {
          title: '原文',
          field: 'edgarUrl',
          width: 72,
          hozAlign: 'center',
          headerSort: false,
          formatter: cell => {
            const url = cell.getValue();
            if (!url) return '—';
            return `<a class="edgar-link" href="${url}" target="_blank" rel="noopener">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                      </svg>
                      EDGAR
                    </a>`;
          }
        }
      ]
    });

    // 筛选事件
    ['f-ticker','f-form','f-date-from','f-date-to'].forEach(id => {
      document.getElementById(id).addEventListener('change', applyFilters);
    });
    document.getElementById('f-filer').addEventListener('input', applyFilters);

    table.on('dataFiltered', updateCount);
    updateCount();

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display  = 'block';
    document.getElementById('error').textContent    = '数据加载失败：' + e.message;
  }
}

init();
</script>
</body>
</html>
