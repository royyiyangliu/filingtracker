name: 港股回购数据爬取

on:
  # 每周一 UTC 08:00（北京时间周一 16:00），SEC 爬虫 06:00 启动，间隔 2 小时避免 push 冲突
  schedule:
    - cron: '0 8 * * 1'
  # 手动触发，支持历史回填（留空则抓最近 8 天）
  workflow_dispatch:
    inputs:
      date_from:
        description: '起始交易日 YYYY-MM-DD（留空则抓最近一周）'
        required: false
        default: ''
      date_to:
        description: '结束交易日 YYYY-MM-DD（留空则抓最近一周）'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm install

      - name: 运行爬虫
        run: node hk-buyback.js
        env:
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO:   ${{ github.event.inputs.date_to }}

      - name: 提交并推送更新数据
        run: |
          git config user.name  "HK Buyback Bot"
          git config user.email "bot@github-actions.com"
          git add data/hk-buybacks.json
          git diff --staged --quiet && echo "数据无更新，跳过提交" || (
            git commit -m "HK buyback update: $(date +%Y-%m-%d)"
            git push
          )

      - name: 发送中概股周报邮件
        if: github.event_name == 'schedule'
        run: node send-email.js
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO:           ${{ secrets.EMAIL_TO }}
