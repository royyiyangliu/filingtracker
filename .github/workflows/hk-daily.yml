name: 港股通每日数据更新

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 每周一至五 UTC 10:00 = HKT 18:00（收盘后）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 更新资金流向
        run: python scripts/backfill.py flow

      - name: 更新个股持股（近14天）
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, "scripts")
          from daily import update_holdings
          update_holdings()
          EOF

      - name: 抓取行业分类（每周一更新，其他时间跳过）
        run: |
          DAY=$(date -u +%u)
          if [ "$DAY" = "1" ]; then
            python scripts/fetch_industry.py
          else
            echo "非周一，跳过行业分类抓取"
          fi

      - name: 构建网站数据
        run: python scripts/build_site.py

      - name: 下载 D3.js（首次或缺失时）
        run: |
          if [ ! -f assets/d3.min.js ]; then
            curl -sL "https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js" -o assets/d3.min.js
            echo "D3.js downloaded"
          else
            echo "D3.js already exists, skipping"
          fi

      - name: 提交更新
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hkdata/ assets/d3.min.js
          git diff --cached --quiet || git commit -m "data: hk daily update $(date -u +%Y-%m-%d) [skip ci]"
          git push
